{% extends "base.html" %} {% block title %}Login | ATS Resume Scanner{% endblock
%} {% block content %}
<main class="content-card">
  <section class="upload-panel">
    <h2>Login</h2>
    <p class="note">Access scan history and contact features by logging in.</p>
    <form method="post" class="auth-form" data-auth-form novalidate>
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
      <label>
        Username
        <input type="text" name="username" placeholder="Your username" minlength="3" required data-validate="username" />
        <span class="field-message" data-message-for="username"></span>
      </label>
      <label>
        Password
        <input
          type="password"
          name="password"
          placeholder="Your password"
          minlength="8"
          required
          data-validate="login-password"
        />
        <span class="field-message" data-message-for="password"></span>
      </label>
      <button type="submit" class="primary-button">Sign In</button>
    </form>
    <p class="auth-switch">
      New here? <a href="{{ url_for('register') }}">Create an account</a>
    </p>
  </section>
</main>
{% endblock %}
